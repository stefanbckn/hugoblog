<article class="post-list h-feed post-card">
    <div class="post-header">
        <header>
            <h2 class="p-name post-title{{ if .Params.favorite }} favorite{{end}}{{ if .Params.draft }} draft{{end}}">
                <a class="u-url" href="{{ .RelPermalink }}">{{ .Date.Format "02 Jan 2006 15:04" }}</a>
            </h2>
        </header>
    </div> 
    {{ $params := partial "params-helper.html" . }}
    {{ if $params.enableSummary }}
        <div class="content post-summary p-summary">
            {{ .Summary | safeHTML }}
        </div>
    {{ end }}
    
    {{ partial "notes-info.html" . }}   
</article>
